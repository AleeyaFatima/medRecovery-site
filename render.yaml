services:
  - type: web
    name: medrecovery-site
    runtime: static
    buildCommand: npm run build
    publishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /robots.txt
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /sitemap.xml
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
